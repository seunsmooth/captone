name: Secure FastAPI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Tests
        run: pytest

      - name: SAST Scan (Bandit)
        run: bandit -r app/

      - name: Dependency Scan
        run: pip-audit

      - name: Secrets Scan
        uses: gitleaks/gitleaks-action@v2

      - name: Build Docker Image
        run: docker build -t fastapi-app:${{ github.sha }} .

      - name: Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi-app:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image
        run: |
          docker tag fastapi-app:${{ github.sha }} $ECR_REGISTRY/app:${{ github.sha }}
          docker push $ECR_REGISTRY/app:${{ github.sha }}